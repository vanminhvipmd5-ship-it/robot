<!DOCTYPE html><html lang="vi">
<head>
<meta charset="UTF-8">
<title>Cyber Robot Login</title>
<style>
body{
  margin:0;
  background: radial-gradient(circle,#0a0a12,#000);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
  color:white;
}.container{
text-align:center;
}

canvas{
display:block;
margin:auto;
}

.form{
margin-top:20px;
}

input{
padding:10px;
margin:5px;
border:none;
border-radius:6px;
outline:none;
}

button{
padding:10px 20px;
background:#ff4df0;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}
</style>

</head><body>
<div class="container"><canvas id="robot" width="300" height="300"></canvas>

<div class="form">
  <input placeholder="Username"><br>
  <input type="password" placeholder="Password"><br>
  <button onclick="login()">LOGIN</button>
</div></div><script>
const canvas = document.getElementById("robot");
const ctx = canvas.getContext("2d");

let frame = 0;
const FPS = 15;

function draw(t){
  ctx.clearRect(0,0,300,300);

  let cx = 150;
  let cy = 140 + Math.sin(t*2)*5;

  // glow
  ctx.shadowBlur = 20;
  ctx.shadowColor = "#ff4df0";

  // head
  ctx.fillStyle = "#111";
  ctx.fillRect(cx-60,cy-60,120,80);

  let cycle = frame % 60;

  let eye = (cycle>=31 && cycle<=32)?0:1;

  ctx.globalAlpha = eye;
  ctx.beginPath();
  ctx.arc(cx-25,cy-20,12,0,Math.PI*2);
  ctx.arc(cx+25,cy-20,12,0,Math.PI*2);
  ctx.fillStyle="#ff4df0";
  ctx.fill();
  ctx.globalAlpha=1;

  // flare
  if(cycle==32){
    ctx.fillStyle="rgba(255,0,200,0.5)";
    ctx.fillRect(0,0,300,300);
  }

  // box
  if(cycle>=31 && cycle<=40){
    let p=(cycle-31)/9;
    ctx.globalAlpha=1-p;
    ctx.filter=`blur(${p*8}px)`;
    ctx.strokeStyle="#ff4df0";
    ctx.strokeRect(cx-15,cy+10,30,30);
    ctx.filter="none";
    ctx.globalAlpha=1;
  }

  // body
  ctx.fillStyle="#1a1a2e";
  ctx.fillRect(cx-30,cy+30,60,60);

  frame++;
}

setInterval(()=>draw(frame/FPS),1000/FPS);

function login(){
  alert("Login thành công 🚀");
}
</script></body>
</html>
